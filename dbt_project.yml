name: 'ecommerce_dbt'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ── Model configurations by layer ─────────────────────────────────────────────
models:
  ecommerce_dbt:

    bronze:
      +schema: BRONZE
      +materialized: view          # Bronze = views over raw tables
      +tags: ["bronze"]

    silver:
      +schema: SILVER
      +materialized: table         # Silver = cleaned tables
      +tags: ["silver"]
      +on_schema_change: sync_all_columns

    gold:
      +schema: GOLD
      +materialized: table         # Gold = business-ready aggregates
      +tags: ["gold"]
      +on_schema_change: sync_all_columns

      # Incremental models in gold
      fct_orders:
        +materialized: incremental
        +incremental_strategy: merge
        +unique_key: order_id

      fct_daily_sales:
        +materialized: incremental
        +incremental_strategy: merge
        +unique_key: ['order_date', 'region']

# ── Variables ─────────────────────────────────────────────────────────────────
vars:
  # Currency conversion rates to USD
  fx_rates:
    USD: 1.00
    EUR: 1.08
    GBP: 1.27
    INR: 0.012

  # Data quality thresholds
  max_discount_pct: 50
  min_order_value: 0

models:
  ecommerce_dbt:
    # Applies to all files under models/example/
    example:
      +materialized: table

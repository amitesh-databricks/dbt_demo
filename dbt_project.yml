name: 'dbt_project'
version: '1.0.0'
config-version: 2

# This must match the name in your dbt Cloud Connection/Profile
profile: 'deb_project' 

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ── Model configurations ──────────────────────────────────────────────────────
models:
  dbt_project:
    # 1. Bronze Layer: Views directly over your raw Snowflake tables
    bronze:
      +materialized: view
      +tags: ["bronze"]
      # Removing +schema here ensures dbt stays inside DBT_PROJECT_SCHEMA

    # 2. Silver Layer: Cleaned and Joined Tables
    silver:
      +materialized: table
      +tags: ["silver"]
      +on_schema_change: sync_all_columns

    # 3. Gold Layer: Business Aggregates and Incremental Models
    gold:
      +materialized: table
      +tags: ["gold"]
      
      fct_orders:
        +materialized: incremental
        +unique_key: order_id

      fct_daily_sales:
        +materialized: incremental
        +unique_key: ['order_date', 'region']

# ── Variables ─────────────────────────────────────────────────────────────────
vars:
  fx_rates:
    USD: 1.00
    EUR: 1.08
    GBP: 1.27
    INR: 0.012